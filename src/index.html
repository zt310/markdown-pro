<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; font-src 'self' data:; img-src 'self' data: file:;">
<title>MarkDown Pro</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">

  <!-- ===== Custom Title Bar (frameless) ===== -->
  <header class="titlebar" id="titlebar">
    <div class="titlebar-left">
      <div class="menu-trigger" id="menu-trigger" title="菜单">☰</div>
      <div class="logo">◈ Mark<span>Down</span> <small>Pro</small></div>
    </div>
    <div class="titlebar-center" id="titlebar-drag">
      <span class="filename" id="filename-display">untitled.md</span>
      <span class="save-indicator" id="save-indicator"></span>
    </div>
    <div class="titlebar-right">
      <button class="win-btn" id="btn-theme" title="切换主题 (Ctrl+T)">🌙</button>
      <button class="win-btn" id="btn-filetree" title="文件树 (Ctrl+B)">📂</button>
      <div class="win-divider"></div>
      <button class="win-btn win-btn-min" id="btn-min" title="最小化">─</button>
      <button class="win-btn win-btn-max" id="btn-max" title="最大化">□</button>
      <button class="win-btn win-btn-close" id="btn-close" title="关闭">✕</button>
    </div>
  </header>

  <!-- ===== Dropdown Menu ===== -->
  <nav class="dropdown-menu" id="dropdown-menu">
    <div class="menu-bar" id="menu-bar"></div>
    <div class="menu-panel" id="menu-panel"></div>
  </nav>

  <!-- ===== Main Content ===== -->
  <div class="main-content">

    <!-- File Tree Sidebar -->
    <aside class="file-tree" id="file-tree">
      <div class="file-tree-header">
        <span>📁 文件</span>
        <button class="btn btn-sm" id="btn-open-folder">打开文件夹</button>
      </div>
      <div class="file-tree-body" id="file-tree-body">
        <div class="file-tree-empty">
          <p>尚未打开文件夹</p>
          <p class="hint">点击上方按钮<br>或 Ctrl+Shift+O</p>
        </div>
      </div>
    </aside>

    <!-- Content Pane -->
    <main class="content-pane">
      <div class="toolbar">
        <div class="toolbar-left">
          <button class="btn btn-small" id="btn-open" title="打开文件 (Ctrl+O)">📂 打开</button>
          <button class="btn btn-small" id="btn-save" title="保存 (Ctrl+S)">💾 保存</button>
          <button class="btn btn-small" id="btn-export-html" title="导出 HTML (Ctrl+E)">🌐 HTML</button>
          <button class="btn btn-small" id="btn-export-pdf" title="导出 PDF (Ctrl+P)">📄 PDF</button>
        </div>
        <div class="toolbar-right">
          <span class="word-count" id="word-count">0 字</span>
        </div>
      </div>
      <div class="viewer-scroll" id="viewer-scroll">
        <div class="rendered-content" id="rendered-content">
          <div class="welcome-screen" id="welcome-screen">
            <div class="welcome-icon">📝</div>
            <h2>MarkDown Pro</h2>
            <p>打开一个 Markdown 文件开始阅读</p>
            <div class="welcome-shortcuts">
              <div><kbd>Ctrl+O</kbd> 打开文件</div>
              <div><kbd>Ctrl+Shift+O</kbd> 打开文件夹</div>
              <div><kbd>Ctrl+T</kbd> 切换主题</div>
              <div><kbd>Ctrl+P</kbd> 导出 PDF</div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <!-- ===== Status Bar ===== -->
  <footer class="statusbar">
    <div class="statusbar-left">
      <span id="status-file">未打开文件</span>
    </div>
    <div class="statusbar-right">
      <span id="status-encoding">UTF-8</span>
      <span id="status-grammar">CommonMark + GFM</span>
    </div>
  </footer>

</div>

<!-- ===== Scripts ===== -->
<script src="../node_modules/markdown-it/dist/markdown-it.min.js"></script>
<script src="../node_modules/katex/dist/katex.min.js"></script>
<script src="../node_modules/mermaid/dist/mermaid.min.js"></script>
<script src="../node_modules/highlight.js/highlight.min.js"></script>
<script src="app.js"></script>
</body>
</html>
